<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #f9fafc, #eef2ff);
            color: #2c2c2c;
            margin: 0;
            padding: 60px 20px;
        }

        .container {
            background: white;
            max-width: 700px;
            margin: auto;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h1 {
            font-family: Georgia, serif;
        }

        button {
            background-color: #4338ca;
            color: white;
            border: none;
            padding: 14px 22px;
            margin: 10px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        button:hover {
            background-color: #312e81;
            transform: translateY(-2px);
        }

        a {
            color: #4338ca;
            font-weight: bold;
            text-decoration: none;
        }

        #result {
            margin-top: 25px;
            font-size: 1.1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <p><a href="scratch.html">← Back to Scratch Page</a></p>

        <h1>What Kind of Experience Designer Are You?</h1>
        <p>Choose the part of an experience you care about most.</p>

        <button onclick="showResult('energy')">Energy & Excitement</button>
        <button onclick="showResult('meaning')">Connection & Meaning</button>
        <button onclick="showResult('details')">Details & Atmosphere</button>

        <p id="result"></p>
    </div>

    <script>
        function showResult(type) {
            const result = document.getElementById("result");

            if (type === "energy") {
                result.innerText = "You are an Engagement Designer. You love high-energy moments like dance events, social activities, and interactive experiences.";
            } else if (type === "meaning") {
                result.innerText = "You are a Connection Designer. You care most about belonging, purpose, and creating meaningful moments like FSY experiences.";
            } else {
                result.innerText = "You are an Atmosphere Designer. You notice the small details that shape how people feel, from aesthetics to flow to environment.";
            }
        }
    </script>
</body>
</html>
